# AI
quarkus.langchain4j.chat-model.provider=openai
# OpenAI configuration - set your API key (prefer using environment variables in production)
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:}
quarkus.langchain4j.openai.chat-model.model-id=o3
quarkus.langchain4j.openai.embedding-model.model-id=text-embedding-3-large
quarkus.langchain4j.openai.chat-model.timeout=120000
quarkus.langchain4j.openai.timeout=60000
quarkus.http.io-threads=4
quarkus.vertx.event-loops-pool-size=8
# IRIS
quarkus.datasource.db-kind=iris
quarkus.datasource.username=_SYSTEM
quarkus.datasource.password=SYS
quarkus.datasource.jdbc.driver=com.intersystems.jdbc.IRISDriver
quarkus.datasource.jdbc.url=jdbc:IRIS://localhost:1972/FHIRSERVER

# HTTP
quarkus.http.port=8080
quarkus.http.idle-timeout=0
quarkus.http.limits.max-body-size=16M
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,origin,x-requested-with
quarkus.http.cors.exposed-headers=location,content-disposition
quarkus.http.cors.access-control-allow-credentials=true