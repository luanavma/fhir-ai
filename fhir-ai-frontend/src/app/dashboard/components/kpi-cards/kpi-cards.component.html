@if (kpis()) {
<div class="kpi-row" role="region" aria-label="Indicadores epidemiológicos">

  <nz-card class="kpi-card">
    <nz-statistic nzTitle="Regiões em Alerta" [nzValue]="kpis()!.regionsInAlert"
      [nzValueStyle]="{ color: '#ff4d4f' }" />
    <small aria-label="Variação desde ontem">
      ▲ {{ kpis()!.regionsInAlertDelta }} desde ontem
    </small>
  </nz-card>

  <nz-card class="kpi-card">
    <nz-statistic nzTitle="Crescimento Médio" [nzValue]="'+' + kpis()!.averageGrowth + '%'"
      [nzValueStyle]="{ color: '#faad14' }" />
    <small>comparado aos 7 dias anteriores</small>
  </nz-card>

  <nz-card class="kpi-card">
    <nz-statistic nzTitle="Reports Analisados" [nzValue]="kpis()!.totalReports" />
    <small>no período selecionado</small>
  </nz-card>

  <nz-card class="kpi-card">
    <nz-statistic nzTitle="Sintoma Principal" [nzValue]="kpis()!.mainSymptom" />
  </nz-card>

  <nz-card class="kpi-card">
    <nz-statistic nzTitle="Risco Epidemiológico" [nzValue]="kpis()!.riskLevel"
      [nzValueStyle]="{ color: riskColor() }" />
  </nz-card>

</div>
}
