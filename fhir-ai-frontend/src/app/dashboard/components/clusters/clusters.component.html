<nz-card nzTitle="Principais Clusters Detectados">
  <ul class="cluster-list" role="list" aria-label="Clusters epidemiológicos detectados">
    @for (cluster of clusters(); track cluster.id) {
    <li class="cluster-item" role="listitem">
      <div class="cluster-icon" aria-hidden="true">🧬</div>
      <div class="cluster-info">
        <strong>Cluster {{ cluster.id }} — {{ cluster.symptoms }}</strong>
        <div class="cluster-meta">
          <nz-tag nzColor="blue">{{ cluster.regions }} regiões</nz-tag>
          <nz-tag nzColor="purple">{{ cluster.totalReports }} reports</nz-tag>
          <nz-tag nzColor="cyan">
            Similaridade: {{ cluster.similarity }}
          </nz-tag>
        </div>
      </div>
    </li>
    }
  </ul>
</nz-card>
