@if (summary()) {
<div class="summary-row">

  <nz-card nzTitle="Recommendations" class="summary-card">
    <ul role="list" aria-label="Epidemiological Recommendations" class="rec-list">
      @for (rec of summary()!.recommendations; track rec) {
      <li role="listitem">
        <span aria-hidden="true">✓</span> {{ rec }}
      </li>
      }
    </ul>
  </nz-card>

</div>
}
