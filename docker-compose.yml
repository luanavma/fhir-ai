services:
  iris:
    build:
      context: iris
      dockerfile: Dockerfile
    image: fhir-iris:local
    container_name: iris
    command: --check-caps false
    ports:
      - "52773:52773"
      - "1972:1972"
    networks:
      - iris-net
    healthcheck:
      test: ["CMD", "iris", "list"]
      interval: 20s
      timeout: 10s
      retries: 10

  fhir-ai-agent:
    build:
      context: fhir-ai-agent
      dockerfile: Dockerfile
    image: fhir-ai-agent:latest
    container_name: fhir-ai-agent
    depends_on:
      iris:
        condition: service_healthy
    env_file:
      - .env
    environment:
      QUARKUS_PROFILE: dev
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:IRIS://iris:1972/FHIRSERVER
      QUARKUS_DATASOURCE_USERNAME: _SYSTEM
      QUARKUS_DATASOURCE_PASSWORD: SYS
    ports:
      - "8080:8080"
    networks:
      - iris-net
    restart: unless-stopped

  fhir-ai-frontend:
    build:
      context: fhir-ai-frontend
      dockerfile: Dockerfile
    image: fhir-ai-frontend:latest
    container_name: fhir-ai-frontend
    ports:
      - "4200:80"
    depends_on:
      - fhir-ai-agent
    networks:
      - iris-net
    restart: unless-stopped

networks:
  iris-net:
    driver: bridge